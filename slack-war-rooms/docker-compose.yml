version: '3.8'

services:
  slack-war-room-bot:
    build: .
    container_name: slack-war-room-bot
    restart: unless-stopped
    environment:
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN}
      - SLACK_APP_TOKEN=${SLACK_APP_TOKEN}
      - SLACK_SIGNING_SECRET=${SLACK_SIGNING_SECRET}
      - SLACK_CLIENT_ID=${SLACK_CLIENT_ID}
      - SLACK_CLIENT_SECRET=${SLACK_CLIENT_SECRET}
      - DB_TYPE=${DB_TYPE:-sqlite}
      - DB_PATH=${DB_PATH:-/app/data/war_rooms.db}
      - ALPHA_4_ENABLED=${ALPHA_4_ENABLED:-true}
      - GAMMA_ENABLED=${GAMMA_ENABLED:-true}
      - BETA_4_ENABLED=${BETA_4_ENABLED:-true}
      - DELTA_ENABLED=${DELTA_ENABLED:-true}
      - CROWDSTRIKE_CLIENT_ID=${CROWDSTRIKE_CLIENT_ID}
      - CROWDSTRIKE_CLIENT_SECRET=${CROWDSTRIKE_CLIENT_SECRET}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - war_room_data:/app/data
      - ./logs:/app/logs
    networks:
      - war_room_network
    depends_on:
      - postgres
    healthcheck:
      test: ["CMD", "python", "/app/scripts/health_check.py"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  postgres:
    image: postgres:15-alpine
    container_name: war-room-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${DB_DATABASE:-war_rooms}
      - POSTGRES_USER=${DB_USERNAME:-war_room_user}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-secure_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - war_room_network
    ports:
      - "5432:5432" # Remove in production
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-war_room_user}"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:7-alpine
    container_name: war-room-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - war_room_network
    ports:
      - "6379:6379" # Remove in production
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:
    image: nginx:alpine
    container_name: war-room-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
    networks:
      - war_room_network
    depends_on:
      - slack-war-room-bot

volumes:
  war_room_data:
  postgres_data:
  redis_data:

networks:
  war_room_network:
    driver: bridge