[tool:pytest]
# Pytest configuration for SecOps AI Platform testing

# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Minimum version
minversion = 6.0

# Additional options
addopts = 
    -v
    --strict-markers
    --strict-config
    --tb=short
    --cov=ai_engine
    --cov=autonomy_tiers  
    --cov=governance
    --cov-report=html:htmlcov
    --cov-report=term-missing
    --cov-fail-under=80
    --durations=10

# Test markers
markers =
    unit: Unit tests for individual components
    integration: Integration tests across components
    performance: Performance and load tests
    security: Security validation tests
    compliance: Compliance and audit tests
    ai: AI model and ML testing
    slow: Long-running tests (>30 seconds)
    requires_aws: Tests requiring AWS services
    requires_models: Tests requiring AI models

# Async test support
asyncio_mode = auto

# Warnings configuration
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore:.*unclosed.*:ResourceWarning

# Log capture
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(name)s: %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

log_file = tests.log
log_file_level = DEBUG
log_file_format = %(asctime)s [%(levelname)8s] %(filename)s:%(lineno)d: %(message)s
log_file_date_format = %Y-%m-%d %H:%M:%S