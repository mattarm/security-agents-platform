# Okta IAM Configuration for Security Analytics

okta:
  # Connection Settings
  domain: "your-org.okta.com"
  api_token: "${OKTA_API_TOKEN}"  # Store in environment or secrets manager
  
  # Event Collection
  events:
    # Log types to collect
    types:
      - "system.auth.login"
      - "system.auth.logout"
      - "system.auth.mfa"
      - "user.session.start"
      - "user.session.end"
      - "user.account.lock"
      - "user.account.unlock"
      - "user.lifecycle.create"
      - "user.lifecycle.activate" 
      - "user.lifecycle.deactivate"
      - "user.lifecycle.suspend"
      - "application.user_membership.add"
      - "application.user_membership.remove"
      - "group.user_membership.add"
      - "group.user_membership.remove"
      - "policy.evaluate_sign_on"
      - "security.threat.detected"
    
    # Collection frequency (minutes)
    polling_interval: 1
    
    # Lookback window for initial collection (hours)
    initial_lookback: 24

# Analytics Configuration
analytics:
  # Behavior baseline settings
  baselines:
    # Learning period for new users (days)
    learning_period: 30
    
    # Minimum events required for baseline
    min_events: 100
    
    # Baseline update frequency (hours)
    update_frequency: 24
    
    # Features for behavior modeling
    features:
      - "login_times"
      - "geo_locations"
      - "device_types"
      - "application_access"
      - "network_zones"
      - "authentication_methods"

  # Anomaly detection thresholds
  thresholds:
    # Standard deviations for anomaly detection
    anomaly_threshold: 2.5
    
    # Risk scoring weights (0-1)
    risk_weights:
      temporal_anomaly: 0.3
      geo_anomaly: 0.4
      behavioral_anomaly: 0.3
    
    # Alert thresholds
    alert_levels:
      low: 0.3
      medium: 0.6
      high: 0.8
      critical: 0.9

# Platform Integration
platforms:
  panther:
    enabled: true
    api_url: "${PANTHER_API_URL}"
    api_token: "${PANTHER_API_TOKEN}"
    
  crowdstrike:
    enabled: false  # Enable during migration
    falcon_client_id: "${CROWDSTRIKE_CLIENT_ID}"
    falcon_client_secret: "${CROWDSTRIKE_CLIENT_SECRET}"
    cloud_region: "us-1"

# Detection Rules Configuration
detections:
  credential_stuffing:
    enabled: true
    threshold: 5  # Failed logins within window
    time_window: 300  # 5 minutes
    
  privilege_escalation:
    enabled: true
    monitor_groups:
      - "Super Admins"
      - "Application Admins"
      - "Read-only Admins"
    
  account_takeover:
    enabled: true
    behavioral_threshold: 3.0  # Standard deviations
    
  lateral_movement:
    enabled: true
    cross_app_threshold: 10  # Apps accessed in time window
    time_window: 3600  # 1 hour
    
  insider_threat:
    enabled: true
    data_access_threshold: 2.5  # Standard deviations
    off_hours_multiplier: 1.5

# Alerting Configuration
alerts:
  # Alert destinations
  destinations:
    - type: "webhook"
      url: "${ALERT_WEBHOOK_URL}"
      format: "json"
    - type: "email"
      recipients:
        - "security-team@company.com"
    - type: "slack"
      webhook_url: "${SLACK_WEBHOOK_URL}"
      channel: "#security-alerts"

  # Alert throttling
  throttling:
    max_alerts_per_hour: 100
    duplicate_suppression: 300  # seconds
    
  # Severity mapping
  severity_mapping:
    low: "INFO"
    medium: "WARN" 
    high: "ERROR"
    critical: "CRITICAL"

# Data Retention
retention:
  # Raw event retention (days)
  raw_events: 90
  
  # Processed analytics retention (days)
  processed_analytics: 365
  
  # Baseline model retention (days)
  baseline_models: 730